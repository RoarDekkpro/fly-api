services:
  - type: web
    name: fly-api
    env: python
    plan: free
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.browsers
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.browsers python -m playwright install chromium --with-deps
    startCommand: gunicorn app:app --timeout 120 --workers 1
